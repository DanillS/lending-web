<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог дверей | Качественные двери</title>
    <meta name="description"
        content="Более 50 моделей межкомнатных дверей. Цены от 12 900 ₽. Фото, характеристики, отзывы.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Каталог межкомнатных дверей">
    <meta property="og:description" content="Более 50 моделей межкомнатных дверей. Цены от 12 900 ₽. Доставка по Казани.">
    <meta property="og:image" content="https://ваш-сайт.ru/images/12.webp">
    <meta property="og:url" content="https://ваш-сайт.ru/catalog">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/webp" href="icons/icon.webp">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="/" class="logo">
                <div class="logo-icon">
                    <img src="./icons/icon.webp" alt="Icon">
                </div>
                <span class="logo-text">Качественные двери</span>
            </a>
        </div>
    </header>

    <main>
        <div class="container">
            <h1 class="section-title" style="margin-top: 40px;">Каталог дверей</h1>
            
            <!-- ПОИСК И ФИЛЬТРЫ -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск по названию..." onkeyup="searchProducts()">
            </div>
            
            <div class="filters">
                <button class="filter-btn active" data-category="all" onclick="filterByCategory('all')">Все</button>
                <button class="filter-btn" data-category="glass" onclick="filterByCategory('glass')">Со стеклом</button>
                <select id="sortSelect" class="sort-select" onchange="sortProducts()">
                    <option value="name">По названию</option>
                    <option value="price_asc">Сначала дешевле</option>
                    <option value="price_desc">Сначала дороже</option>
                </select>
            </div>     
            <div id="catalogContainer" class="catalog-grid">
                <div style="text-align:center; padding:40px">Загрузка каталога...</div>
            </div>
        </div>
        
        <!-- БЫСТРАЯ ФОРМА -->
        <div class="container" id="contact">
            <div class="contact-section">
                <div class="contact-flex">
                    <div class="contact">
                        <h2 style="font-size:2rem; margin-bottom:48px">Не нашли подходящую дверь?</h2>
                        <p style="margin-bottom:48px">Оставьте заявку, и мы перезвоним в течение 15 минут. Или напишите в
                            мессенджеры.</p>
                        <div>
                            <a href="https://wa.me/79503101560" target="_blank" class="btn btn-wa btn-tie"><i
                                    class="bi bi-whatsapp"></i> WhatsApp</a>
                            <a href="https://t.me/pr0gger/" target="_blank" class="btn btn-tg btn-tie"><i
                                    class="bi bi-telegram"></i> Telegram</a>
                            <a href="mailto:stepanovpg@gmail.com" class="btn btn-em btn-tie"><i class="bi bi-envelope"></i>
                                Email</a>
                        </div>
                    </div>
                    <div>
                        <form id="orderForm">
                            <div class="form-group"><input type="text" id="orderName" placeholder="Ваше имя *" required></div>
                            <div class="form-group"><input type="tel" id="orderPhone" placeholder="Телефон *" required></div>
                            <div class="form-group"><input type="text" id="orderProduct" placeholder="Какая модель интересует?">
                            </div>
                            <div class="form-group"><textarea id="orderComment" rows="3" placeholder="Комментарий"></textarea>
                            </div>
                            <button type="submit" class="btn btn-dark" style="width:100%">Отправить заявку</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© Качественные двери | Казань | 8 (950) 310-15-60</p>
        </div>
    </footer>

    <script src="/script.js"></script>
    <script>
        // Переопределяем для каталога - показываем все товары сразу
        document.addEventListener('DOMContentLoaded', () => {
            // script.js уже загрузит каталог и покажет все товары
        });
    </script>
</body>
</html>
