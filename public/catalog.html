<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог дверей | ДвериСтиль</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="/" class="logo">
                <div class="logo-icon">🚪</div>
                <span class="logo-text">ДвериСтиль</span>
            </a>
            <ul class="nav-links">
                <li><a href="/#services">Услуги</a></li>
                <li><a href="/catalog.html">Каталог</a></li>
                <li><a href="/#advantages">Преимущества</a></li>
                <li><a href="/#contact">Контакты</a></li>
            </ul>
            <button class="mobile-menu-btn" id="menuToggle">☰</button>
        </div>
        <div class="mobile-nav" id="mobileNav">
            <a href="/">Главная</a>
            <a href="/#services">Услуги</a>
            <a href="/catalog.html">Каталог</a>
            <a href="/#contact">Связаться</a>
        </div>
    </header>

    <main>
        <div class="container">
            <h1 class="section-title" style="margin-top: 40px;">Каталог дверей</h1>
            
            <!-- ПОИСК И ФИЛЬТРЫ -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск по названию..." onkeyup="searchProducts()">
            </div>
            
            <div class="filters">
                <button class="filter-btn active" data-category="all" onclick="filterByCategory('all')">Все</button>
                <button class="filter-btn" data-category="interior" onclick="filterByCategory('interior')">Межкомнатные</button>
                <button class="filter-btn" data-category="entrance" onclick="filterByCategory('entrance')">Входные</button>
                <button class="filter-btn" data-category="glass" onclick="filterByCategory('glass')">Со стеклом</button>
            </div>
            
            <div class="sort-box">
                <select id="sortSelect" class="sort-select" onchange="sortProducts()">
                    <option value="name">По названию</option>
                    <option value="price_asc">Сначала дешевле</option>
                    <option value="price_desc">Сначала дороже</option>
                </select>
            </div>
            
            <div id="catalogContainer" class="catalog-grid">
                <div style="text-align:center; padding:40px">Загрузка каталога...</div>
            </div>
        </div>
        
        <!-- БЫСТРАЯ ФОРМА -->
        <div class="container" id="contact" style="margin-top: 40px; margin-bottom: 60px;">
            <div class="contact-section">
                <h2 style="font-size:1.8rem; margin-bottom:24px; text-align:center">Не нашли подходящую дверь?</h2>
                <p style="text-align:center; margin-bottom:24px">Оставьте заявку, и мы подберем идеальный вариант под ваш интерьер!</p>
                <form id="orderForm" style="max-width: 500px; margin: 0 auto;">
                    <div class="form-group"><input type="text" id="orderName" placeholder="Ваше имя *" required></div>
                    <div class="form-group"><input type="tel" id="orderPhone" placeholder="Телефон *" required></div>
                    <div class="form-group"><input type="text" id="orderProduct" placeholder="Какую дверь ищете?"></div>
                    <button type="submit" class="btn btn-dark" style="width:100%">Отправить заявку</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© ДвериСтиль | Казань, ул. Центральная 15 | 8 (950) 310-15-60</p>
        </div>
    </footer>

    <script src="/script.js"></script>
    <script>
        // Переопределяем для каталога - показываем все товары сразу
        document.addEventListener('DOMContentLoaded', () => {
            // script.js уже загрузит каталог и покажет все товары
        });
    </script>
</body>
</html>
